  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"pt-BR\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Painel de Visibilidade — Ecossistema de Bots e Conversão<\u002Ftitle>\n<style>/* fallback */\n@font-face {\n  font-family: 'Material Symbols Rounded';\n  font-style: normal;\n  font-weight: 400;\n  src: url(\"f43ebe18-0a6e-4644-9f10-1fad7805fd82\") format('woff2');\n}\n\n.material-symbols-rounded {\n  font-family: 'Material Symbols Rounded';\n  font-weight: normal;\n  font-style: normal;\n  font-size: 24px;\n  line-height: 1;\n  letter-spacing: normal;\n  text-transform: none;\n  display: inline-block;\n  white-space: nowrap;\n  word-wrap: normal;\n  direction: ltr;\n  -webkit-font-feature-settings: 'liga';\n  -webkit-font-smoothing: antialiased;\n}\n<\u002Fstyle>\n<style>\n  @font-face { font-family:'Aeonik'; src:url(\"1aea1497-fe3e-4165-8b2f-56d6b0533b28\") format('opentype'); font-weight:400; font-display:swap; }\n  @font-face { font-family:'Aeonik'; src:url(\"f89528a1-79f8-4e17-a381-a73006784047\")  format('opentype'); font-weight:500; font-display:swap; }\n  @font-face { font-family:'Aeonik'; src:url(\"3e0a4bc1-6b4c-47a0-ae4e-4b1834894058\")    format('opentype'); font-weight:700; font-display:swap; }\n  @font-face { font-family:'Aeonik Fono'; src:url(\"a0feaf80-357c-4c8f-97c5-11fd2f24caaa\") format('opentype'); font-weight:500; font-display:swap; }\n  @font-face { font-family:'Aeonik Fono'; src:url(\"320905a2-78a9-476d-a2bc-ba0ffa08b644\")   format('opentype'); font-weight:700; font-display:swap; }\n\n  :root{\n    --verde-escuro:#014751; --verde-medio:#038C52; --verde-claro:#09CF7C;\n    --roxo:#974AFD; --lavanda:#CEC1F7; --menta:#ABF4C4;\n    --gray-50:#FAFAFA; --gray-100:#F2F2F2; --gray-200:#E5E5E5; --gray-300:#CCCCCC;\n    --gray-400:#737373; --gray-500:#555555; --gray-600:#4D4D4D; --gray-700:#333333; --gray-900:#1A1A1A;\n\n    --st-verde-bg:#DFF7EB;  --st-verde-fg:#026B3F;  --st-verde-bd:#B3F1D5;\n    --st-desej-bg:#EDE6FE;  --st-desej-fg:#4A1890;  --st-desej-bd:#E1CFFC;\n    --st-amar-bg:#FFF1D6;   --st-amar-fg:#8A5A00;   --st-amar-bd:#FADFA1;\n    --st-verm-bg:#FCE4E0;   --st-verm-fg:#A3321F;   --st-verm-bd:#F6C8C0;\n\n    --r-sm:4px; --r-md:8px; --r-lg:12px; --r-xl:16px;\n    --shadow-sm:0 1px 3px rgba(0,0,0,.06);\n    --shadow-md:0 6px 18px rgba(0,0,0,.07);\n\n    --font-body:'Aeonik','Helvetica Neue',Arial,sans-serif;\n    --font-display:'Aeonik Fono','Helvetica Neue',Arial,sans-serif;\n  }\n\n  *{box-sizing:border-box;margin:0;padding:0;}\n  html,body{\n    background:var(--gray-50);\n    color:var(--gray-900);\n    font-family:var(--font-body);\n    -webkit-font-smoothing:antialiased;\n  }\n  body{ padding:36px 40px 64px; min-height:100vh; }\n  .page{ max-width:1400px; margin:0 auto; }\n\n  /* ── Topbar compacto ──────────────────────── */\n  .topbar{\n    display:flex; align-items:center; justify-content:space-between;\n    gap:24px; margin-bottom:22px;\n  }\n  .brand{ display:flex; align-items:center; gap:12px; }\n  .brand .logo{\n    width:40px; height:40px; border-radius:10px;\n    background:var(--verde-escuro);\n    display:flex; align-items:center; justify-content:center;\n    color:#fff; font-family:var(--font-display); font-weight:700;\n    font-size:17px; letter-spacing:-.02em;\n    box-shadow:0 0 0 1px rgba(1,71,81,.2), 0 4px 12px rgba(1,71,81,.16);\n    position:relative;\n  }\n  .brand .logo::after{\n    content:\"\"; position:absolute; inset:auto 8px 8px auto;\n    width:4px; height:4px; border-radius:50%; background:var(--verde-claro);\n    box-shadow:0 0 8px rgba(9,207,124,.9);\n  }\n  .brand .meta{ display:flex; flex-direction:column; gap:2px; }\n  .brand .meta .kicker{\n    font-size:10.5px; color:var(--verde-medio); font-weight:600;\n    letter-spacing:.12em; text-transform:uppercase;\n  }\n  .brand .meta h1{\n    font-family:var(--font-display); font-weight:500;\n    font-size:19px; line-height:24px; letter-spacing:-.015em;\n    color:var(--gray-900);\n  }\n\n  .topbar-right{ display:flex; align-items:center; gap:8px; }\n  .chip{\n    display:inline-flex; align-items:center; gap:7px;\n    padding:7px 12px; border-radius:9999px;\n    background:#fff; border:1px solid var(--gray-200);\n    font-size:12.5px; color:var(--gray-700); font-weight:500;\n    box-shadow:var(--shadow-sm);\n    cursor:pointer;\n  }\n  .chip .material-symbols-rounded{ font-size:16px; color:var(--gray-500); }\n  .chip .dot{ width:7px; height:7px; border-radius:50%; background:var(--verde-claro); box-shadow:0 0 0 3px rgba(9,207,124,.18); }\n  .chip.live{ cursor:default; }\n  .chip:hover:not(.live){ background:var(--gray-50); }\n  .icon-btn{\n    width:36px; height:36px; display:inline-flex; align-items:center; justify-content:center;\n    background:#fff; border:1px solid var(--gray-200); border-radius:10px;\n    color:var(--gray-600); cursor:pointer; box-shadow:var(--shadow-sm);\n  }\n  .icon-btn:hover{ background:var(--gray-50); }\n\n  /* ── Abas ─────────────────────────────────── */\n  .tabs{\n    display:flex; align-items:flex-end; gap:4px;\n    border-bottom:1px solid var(--gray-200);\n    margin-bottom:20px;\n  }\n  .tab{\n    position:relative;\n    padding:11px 18px 14px; cursor:pointer;\n    font-family:var(--font-body); font-weight:500; font-size:14px;\n    color:var(--gray-500);\n    display:flex; align-items:center; gap:8px;\n    border:none; background:transparent;\n  }\n  .tab .count{\n    display:inline-flex; align-items:center; justify-content:center;\n    min-width:20px; height:20px; padding:0 6px;\n    font-size:11px; font-weight:600; font-family:var(--font-display);\n    border-radius:9999px; background:var(--gray-100); color:var(--gray-600);\n  }\n  .tab.active{ color:var(--gray-900); }\n  .tab.active::after{\n    content:\"\"; position:absolute; left:8px; right:8px; bottom:-1px;\n    height:2px; background:var(--verde-claro); border-radius:2px 2px 0 0;\n  }\n  .tab.active .count{ background:var(--st-verm-bg); color:var(--st-verm-fg); }\n  .tab:hover:not(.active){ color:var(--gray-700); }\n\n  /* ── Week selector ─────────────────────────── */\n  .week-bar{\n    display:flex; align-items:center; gap:12px;\n    background:#fff; border:1px solid var(--gray-200); border-radius:12px;\n    padding:12px 16px; margin-bottom:18px; box-shadow:var(--shadow-sm);\n  }\n  .week-bar .label{\n    font-size:10.5px; text-transform:uppercase; letter-spacing:.12em;\n    color:var(--verde-medio); font-weight:600; margin-right:4px; white-space:nowrap;\n  }\n  .weeks{ display:flex; align-items:stretch; gap:6px; flex:1; overflow-x:auto; padding:2px; }\n  .week{\n    position:relative;\n    display:flex; flex-direction:column; align-items:flex-start; gap:4px;\n    min-width:110px; padding:8px 12px;\n    border-radius:10px; border:1px solid var(--gray-200);\n    background:#fff; cursor:pointer;\n    transition:all 150ms cubic-bezier(.2,0,0,1);\n  }\n  .week:hover{ background:var(--gray-50); }\n  .week .wk{\n    font-size:10px; font-weight:600; letter-spacing:.1em;\n    text-transform:uppercase; color:var(--gray-400);\n  }\n  .week .range{\n    font-family:var(--font-display); font-weight:500; font-size:12.5px;\n    color:var(--gray-700); letter-spacing:-.01em;\n  }\n  .week .pulse{\n    position:absolute; top:8px; right:8px;\n    width:6px; height:6px; border-radius:50%;\n  }\n  .week.st-verde .pulse{ background:var(--verde-claro); }\n  .week.st-desej .pulse{ background:var(--roxo); }\n  .week.st-amar  .pulse{ background:#C7A500; }\n  .week.st-verm  .pulse{ background:#C23434; box-shadow:0 0 0 3px rgba(194,52,52,.18); }\n  .week.active{\n    border-color:var(--verde-escuro);\n    background:var(--verde-escuro);\n    box-shadow:0 6px 14px rgba(1,71,81,.18);\n  }\n  .week.active .wk{ color:rgba(255,255,255,.65); }\n  .week.active .range{ color:#fff; }\n\n  .week-status{\n    display:inline-flex; align-items:center; gap:6px;\n    padding:6px 12px; border-radius:9999px;\n    font-size:12px; font-w
